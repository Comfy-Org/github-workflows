name: Cursor Review (reusable)

# Reusable, label-triggered multi-model code review. A 4-lab × 2-review-type
# panel (8 cursor-agent cells) runs adversarial + edge-case passes, then a
# judge model consolidates the findings into ONE review posted on the PR,
# with per-finding severity badges (critical/high/medium/low/nit).
#
# Single source of truth: the prompts and the output/post/notify scripts
# live in THIS repo under .github/cursor-review/. Consumer repos add only a
# thin caller — they don't carry copies of the review logic, so there's no
# drift to keep in sync.
#
# Caller pattern (place in source repo at .github/workflows/ci-cursor-review.yml):
#
#   name: CI - Cursor Review
#   on:
#     pull_request:
#       types: [labeled, unlabeled]
#   permissions:
#     contents: read
#     pull-requests: write
#   concurrency:
#     group: cursor-review-pr-${{ github.event.pull_request.number }}-${{ github.event.label.name }}
#     cancel-in-progress: true
#   jobs:
#     cursor-review:
#       uses: Comfy-Org/github-workflows/.github/workflows/cursor-review.yml@main
#       with:
#         # Repo-specific pathspecs excluded from the size cap and the diff.
#         diff_excludes: >-
#           :!**/package-lock.json
#           :!data/object_info.json.gz
#         # Pin the assets ref to the same ref you pin `uses:` to for
#         # reproducibility (defaults to main).
#         workflows_ref: main
#         # Optional: post the review under your own GitHub App so its threads are
#         # a distinct, queryable identity instead of github-actions[bot]. Supply
#         # your App's id + private key (App IDs aren't secret, so id is an input).
#         bot_app_id: ${{ vars.REVIEW_BOT_APP_ID }}
#       secrets:
#         CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
#         SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
#         # Optional — the private key paired with bot_app_id.
#         BOT_APP_PRIVATE_KEY: ${{ secrets.REVIEW_BOT_PRIVATE_KEY }}

on:
  workflow_call:
    inputs:
      judge_model:
        description: >-
          Single judge model that adjudicates panel findings into one
          consolidated review. Picked to match the highest reasoning tier in
          the panel.
        type: string
        required: false
        default: claude-opus-4-8-thinking-max
      diff_size_cap:
        description: >-
          Max changed lines (added + removed, after diff_excludes). PRs over
          the cap are skipped — too large for a useful single-pass review.
        type: number
        required: false
        default: 5000
      review_label:
        description: Label whose addition triggers the review.
        type: string
        required: false
        default: cursor-review
      diff_excludes:
        description: >-
          Whitespace-separated git pathspecs excluded from BOTH the size-budget
          count and the diff fed to Cursor. Pass your repo's generated/vendored
          paths (lockfiles, snapshots, fixtures) so they don't blow the cap or
          waste review signal. Folded scalar collapses newlines to spaces so the
          value word-splits into pathspec args. Paths with a leading underscore
          need the long-form `:(exclude)` syntax — the short-form `:!` parser
          reads `_` as pathspec magic.
        type: string
        required: false
        default: >-
          :!**/package-lock.json
          :!**/yarn.lock
          :!**/pnpm-lock.yaml
          :!**/go.sum
          :!**/node_modules/**
          :!**/.claude/**
          :!**/dist/**
          :!**/vendor/**
          :!**/*.generated.*
          :!**/*.min.js
          :!**/*.min.css
      workflows_ref:
        description: >-
          Ref of Comfy-Org/github-workflows to load the prompts and scripts
          from. Pin this to the same ref you pin `uses:` to for reproducibility.
        type: string
        required: false
        default: main
      bot_app_id:
        description: >-
          GitHub App ID. When set (with the bot_app_private_key secret), the
          consolidated review + per-finding line comments post under that App's
          identity (your App's "<app>[bot]" login) instead of
          github-actions[bot], so its threads are distinct and queryable.
          Optional — omit to post as github-actions[bot] (default; unchanged for
          OSS consumers). App IDs aren't secret, so this is an input, not a secret.
        type: string
        required: false
        default: ''
      run_without_label:
        description: >-
          Run on plain pull_request events (opened / reopened / ready_for_review
          / synchronize) instead of requiring the trigger label — for repos with
          no labeling automation. The fork skip, the skip-cursor-review label,
          and the same-commit dedupe all still apply. Default false
          (label-triggered, unchanged for existing callers).
        type: boolean
        required: false
        default: false
    secrets:
      CURSOR_API_KEY:
        description: Cursor API key for cursor-agent (the panel + judge models bill through it).
        required: true
      SLACK_BOT_TOKEN:
        description: Slack bot token for the start/complete DM notifications. Optional — DMs are skipped if absent.
        required: false
      BOT_APP_PRIVATE_KEY:
        description: PEM private key matching the bot_app_id input. Required only when bot_app_id is set.
        required: false

# DIFF_SIZE_CAP / REVIEW_LABEL / JUDGE_MODEL / DIFF_EXCLUDES are mapped from
# `inputs` here so the run steps below read them verbatim from the original
# (private-repo) workflow without per-step plumbing. `inputs` is available to
# workflow-level env in a called workflow; `secrets` is not (those stay in jobs).
env:
  DIFF_SIZE_CAP: ${{ inputs.diff_size_cap }}
  REVIEW_LABEL: ${{ inputs.review_label }}
  JUDGE_MODEL: ${{ inputs.judge_model }}
  DIFF_EXCLUDES: ${{ inputs.diff_excludes }}
  # Where the assets checkout lands (this repo, .github/cursor-review/*).
  CURSOR_REVIEW_ASSETS: ${{ github.workspace }}/_cursor_review_assets/.github/cursor-review

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      already_reviewed: ${{ steps.dup.outputs.already_reviewed }}
    steps:
      - name: Check trigger label
        id: check
        env:
          LABEL_NAME: ${{ github.event.label.name }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          GH_EVENT_ACTION: ${{ github.event.action }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          RUN_WITHOUT_LABEL: ${{ inputs.run_without_label }}
        run: |
          # PRs from forks can't run this review. The pull_request event grants
          # fork PRs no access to secrets — so CURSOR_API_KEY is empty and every
          # panel cell produces empty output — and a read-only GITHUB_TOKEN, so
          # posting the consolidated review returns HTTP 403. The review can
          # neither analyze nor post, so skip cleanly instead of burning the
          # 8-cell matrix + judge and failing red on every external contribution.
          # (head.repo.full_name != github.repository is the cross-repo signal.)
          if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "PR is from a fork ($HEAD_REPO != $BASE_REPO) — review needs secrets and write access a fork PR can't have. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # skip-cursor-review wins even if the trigger label is also present.
          if echo "$PR_LABELS" | jq -e 'index("skip-cursor-review")' > /dev/null; then
            echo "skip-cursor-review label present — skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Label-free mode (run_without_label input): callers in repos with no
          # labeling automation opt in to running on plain PR events. Sits
          # BELOW the fork skip and skip-cursor-review checks — those still
          # veto — and the same-commit dedupe below still prevents re-reviews.
          if [ "$RUN_WITHOUT_LABEL" = "true" ]; then
            case "$GH_EVENT_ACTION" in
              opened|reopened|ready_for_review|synchronize)
                echo "run_without_label mode — running on '$GH_EVENT_ACTION'."
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          # Only adding the trigger label fires the matrix. Removing it cancels
          # any in-progress run via the concurrency group and then no-ops here.
          if [ "$LABEL_NAME" = "$REVIEW_LABEL" ] && [ "$GH_EVENT_ACTION" = "labeled" ]; then
            echo "$REVIEW_LABEL label added — running."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Removing skip-cursor-review while the trigger label is present
          # unblocks a previously skipped review — treat it as a fresh trigger.
          if [ "$LABEL_NAME" = "skip-cursor-review" ] && [ "$GH_EVENT_ACTION" = "unlabeled" ]; then
            if echo "$PR_LABELS" | jq -e --arg l "$REVIEW_LABEL" 'index($l)' > /dev/null; then
              echo "skip-cursor-review removed while $REVIEW_LABEL is present — running."
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "Label '$LABEL_NAME' is not the trigger label — skipping."
          echo "should_run=false" >> "$GITHUB_OUTPUT"

      - name: Check for prior review on this commit
        id: dup
        if: steps.check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Idempotency: skip the matrix if a Cursor Review consolidated
          # review already exists for this exact HEAD SHA. Protects against
          # label remove+re-add (or any other event-replay path) from
          # re-running the panel on unchanged content.
          #
          # Escape hatches:
          # - Push commits → new HEAD SHA, check finds nothing, runs.
          # - Dismiss the existing review → DISMISSED state filtered out
          #   below, so re-applying the label fires a fresh run.
          #
          # API failure falls through to running, not skipping — better to
          # double-review than silently no-op.
          EXISTING=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" 2>/dev/null \
            | jq --arg sha "$HEAD_SHA" '[.[] | select(.commit_id == $sha and .state != "DISMISSED" and (.body | startswith("## 🔍 Cursor Review — Consolidated panel")))] | length' \
            2>/dev/null || echo 0)

          if [ "$EXISTING" -gt 0 ]; then
            echo "Already reviewed at $HEAD_SHA ($EXISTING existing review(s)) — skipping matrix."
            echo "already_reviewed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No prior review for $HEAD_SHA — proceeding."
            echo "already_reviewed=false" >> "$GITHUB_OUTPUT"
          fi

  diff-size:
    name: Diff size check
    needs: gate
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      within_cap: ${{ steps.count.outputs.within_cap }}
    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Count changed lines
        id: count
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # numstat reports "-\t-" for binary files; treat those as 0 lines so
          # binary-only PRs can't bypass the size cap by producing no insertion
          # tokens for grep to count.
          # $DIFF_EXCLUDES is intentionally unquoted: bash word-splits it into
          # separate pathspec args. Pathspecs all start with ":!", so pathname
          # expansion finds no matches and leaves them literal.
          # shellcheck disable=SC2086
          TOTAL=$(git diff --numstat "$BASE_SHA...$HEAD_SHA" -- . $DIFF_EXCLUDES \
            | awk '{ if ($1 != "-") added += $1; if ($2 != "-") removed += $2 } END { print (added + removed) + 0 }')
          echo "Changed lines: $TOTAL (cap: $DIFF_SIZE_CAP)"

          if [ "$TOTAL" -gt "$DIFF_SIZE_CAP" ]; then
            echo "Diff exceeds cap — skipping review."
            echo "within_cap=false" >> "$GITHUB_OUTPUT"
          else
            echo "within_cap=true" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    # Validate the panel's pinned model ids against the LIVE Cursor catalog
    # once, before the 8-cell fan-out. When Cursor delists a pinned id the
    # per-cell `cursor-agent --model <id>` call fails with 0 bytes of stdout,
    # which downstream reads as an `empty` cell — indistinguishable from "the
    # model ran and found nothing", so the panel silently runs a lab short for
    # weeks. Failing here turns that drift into a loud, visible job failure on
    # the very next run. This job is ALSO the single source of truth for the
    # matrix model list (emitted as an output the `review` matrix consumes), so
    # the validated list and the reviewed list can never drift apart.
    name: Preflight — validate model catalog
    needs: [gate, diff-size]
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true' && needs.diff-size.outputs.within_cap == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      models: ${{ steps.models.outputs.models }}
    steps:
      - name: Define panel models
        id: models
        # Single source of truth for the per-lab model pins. The `review`
        # matrix consumes this list via fromJSON, and the catalog check below
        # validates every entry — so a bump only ever touches this one list.
        # Keep in sync with the README model table.
        #
        # Pinned to each lab's newest highest-reasoning tier in Cursor's
        # catalog (last checked 2026-07-14). OpenAI: GPT-5.6 Sol is the
        # 5.6-family coding flagship (no 5.6 codex variant exists). Anthropic:
        # Fable 5 tops the catalog but all Fable entries are marked NO ZDR in
        # Cursor, and this panel reviews private-repo diffs, so it is excluded;
        # Opus 4.8 thinking at its max tier is the top ZDR-eligible pick.
        # Gemini (Pro line) and Kimi still ship a single reasoning tier each.
        run: |
          cat > /tmp/models.json <<'JSON'
          [
            "gpt-5.6-sol-max",
            "claude-opus-4-8-thinking-max",
            "gemini-3.1-pro",
            "kimi-k2.7-code"
          ]
          JSON
          echo "models=$(jq -c . /tmp/models.json)" >> "$GITHUB_OUTPUT"

      - name: Install Cursor agent CLI
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          # Fork PRs (and any run without the secret) get no CURSOR_API_KEY, so
          # `cursor-agent models` can't authenticate. Skip cleanly — matches the
          # gate's fork handling, which already sets should_run=false for forks.
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "No CURSOR_API_KEY (fork PR or unset secret) — skipping catalog preflight."
            exit 0
          fi
          curl https://cursor.com/install -fsSL | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Validate model pins against live catalog
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "No CURSOR_API_KEY — skipping catalog preflight (matches fork handling)."
            exit 0
          fi

          # Capture the live catalog. A failure here (auth/network) is itself a
          # hard fail — better red than a silently degraded panel.
          if ! cursor-agent models > /tmp/catalog.txt 2>/tmp/catalog-stderr.txt; then
            echo "::error::'cursor-agent models' failed — cannot verify the panel model pins."
            cat /tmp/catalog-stderr.txt
            exit 1
          fi
          echo "=== Cursor catalog ==="
          cat /tmp/catalog.txt

          python3 - <<'PY'
          import json
          import re
          import sys

          with open("/tmp/models.json", encoding="utf-8") as f:
              pins = json.load(f)
          with open("/tmp/catalog.txt", encoding="utf-8") as f:
              catalog_raw = f.read()

          catalog_lines = [ln.strip() for ln in catalog_raw.splitlines() if ln.strip()]

          def present(model_id):
              # Match the id as a whole token so `kimi-k2.5` doesn't match inside
              # `kimi-k2.55`; ids contain `.`/`-`, so bound on those too.
              pattern = r"(?<![\w.-])" + re.escape(model_id) + r"(?![\w.-])"
              return re.search(pattern, catalog_raw) is not None

          missing = [m for m in pins if not present(m)]
          if not missing:
              print("All pinned models present in the Cursor catalog:")
              for m in pins:
                  print(f"  - {m}")
              sys.exit(0)

          print(f"::error::Cursor catalog is missing pinned model id(s): {', '.join(missing)}")
          for m in missing:
              lab = re.split(r"[-.]", m, maxsplit=1)[0]
              hints = sorted({ln for ln in catalog_lines if lab.lower() in ln.lower()})
              hint = ", ".join(hints) if hints else "(no same-lab id found)"
              print(f"  - {m}: closest available for lab '{lab}': {hint}")
          print(
              "Update the pin in the preflight 'Define panel models' step (and the "
              "README model table) to a current catalog id."
          )
          sys.exit(1)
          PY

  review:
    # Each cell produces a findings artifact. No cell posts a review —
    # consolidate adjudicates the panel and posts ONE review at the end.
    name: '${{ matrix.review_type }} (${{ matrix.model }})'
    # `preflight` gates the fan-out: if a pinned model is delisted it fails
    # there, and this job is skipped instead of quietly running a lab short.
    needs: [gate, diff-size, preflight]
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true' && needs.diff-size.outputs.within_cap == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Model list comes from the preflight job (single source of truth); it
        # is validated against the live catalog there.
        model: ${{ fromJSON(needs.preflight.outputs.models) }}
        review_type: [adversarial, edge-case]
    steps:
      - name: Seed default findings artifact
        # Pre-seed a minimal artifact tagged status=error so this cell
        # ALWAYS shows up in the panel summary, even if a later step
        # (checkout, Cursor install, prompt build, tool submission) fails. The
        # MCP output tool overwrites this on success. Without
        # this, an early-failing cell silently disappears from the panel
        # and the consolidated review undercounts the matrix.
        env:
          MODEL: ${{ matrix.model }}
          REVIEW_TYPE: ${{ matrix.review_type }}
        run: |
          mkdir -p /tmp/findings-out
          python3 - <<'PY'
          import json, os
          record = {
              "model": os.environ["MODEL"],
              "review_type": os.environ["REVIEW_TYPE"],
              "status": "error",
              "error": "Cell did not reach the extraction step.",
              "findings": [],
          }
          with open("/tmp/findings-out/findings.json", "w", encoding="utf-8") as f:
              json.dump(record, f)
          PY

      - name: Checkout PR repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load cursor-review assets
        # Trusted prompts/scripts come from THIS workflow's repo (public,
        # pinned via workflows_ref) — never from the PR checkout, so a
        # malicious PR can't rewrite the prompt to exfiltrate the diff or
        # smuggle instructions to the model.
        uses: actions/checkout@v6
        with:
          repository: Comfy-Org/github-workflows
          ref: ${{ inputs.workflows_ref }}
          path: _cursor_review_assets
          persist-credentials: false

      - name: Generate diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # See diff_excludes input for the rationale and pathspec list.
          # shellcheck disable=SC2086
          git diff "$BASE_SHA...$HEAD_SHA" -- . $DIFF_EXCLUDES > /tmp/pr-diff.patch

          echo "Diff size: $(wc -l < /tmp/pr-diff.patch) lines"

      - name: Install Cursor agent CLI
        run: |
          curl https://cursor.com/install -fsSL | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Log Cursor agent version
        # The install script is unpinned (curl | bash from cursor.com), so we
        # log the installed version into the run for forensics rather than
        # gating on a hard-coded baseline. A version equality check produced
        # daily toil without adding integrity protection — a CDN compromise
        # would just ship malicious bits as a "new version" we'd then bump to.
        run: cursor-agent --version

      - name: Configure structured review output
        env:
          MODEL: ${{ matrix.model }}
          REVIEW_TYPE: ${{ matrix.review_type }}
        run: |
          python3 "$CURSOR_REVIEW_ASSETS/review-output-mcp.py" \
            --mode reviewer \
            --out /tmp/findings-out/findings.json \
            --model "$MODEL" \
            --review-type "$REVIEW_TYPE" \
            --init

          rm -rf -- .cursor
          mkdir -m 700 .cursor
          python3 - <<'PY'
          import json, os, sys, tempfile

          if os.path.islink(".cursor"):
              raise SystemExit("Refusing to write Cursor config through a symlinked .cursor directory")

          config = {
              "mcpServers": {
                  "cursor-review-output": {
                      "type": "stdio",
                      "command": sys.executable,
                      "args": [
                          os.path.join(os.environ["CURSOR_REVIEW_ASSETS"], "review-output-mcp.py"),
                          "--mode", "reviewer",
                          "--out", "/tmp/findings-out/findings.json",
                          "--model", os.environ["MODEL"],
                          "--review-type", os.environ["REVIEW_TYPE"],
                      ],
                  }
              }
          }
          cli_config = {
              "permissions": {
                  "allow": [
                      "Mcp(cursor-review-output:cursor_review_record_finding)",
                      "Mcp(cursor-review-output:cursor_review_finish)",
                  ],
                  "deny": [],
              }
          }
          for filename, value in (("mcp.json", config), ("cli.json", cli_config)):
              fd, temporary = tempfile.mkstemp(dir=".cursor", prefix=f".{filename}-")
              with os.fdopen(fd, "w", encoding="utf-8") as output:
                  json.dump(value, output)
              os.replace(temporary, os.path.join(".cursor", filename))
          PY

      - name: Build prompt
        env:
          REVIEW_TYPE: ${{ matrix.review_type }}
        run: |
          {
            cat "$CURSOR_REVIEW_ASSETS/prompt-${REVIEW_TYPE}.md"
            cat /tmp/pr-diff.patch
            echo ""
            echo "=== END DIFF ==="
          } > /tmp/prompt.txt

          echo "Prompt size: $(wc -c < /tmp/prompt.txt) bytes"

      - name: Run cursor review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MODEL: ${{ matrix.model }}
        run: |
          # --sandbox is intentionally omitted. The hosted runner is already
          # an ephemeral VM, so the agent's AppArmor sandbox doesn't add
          # protection — and as of cursor-agent 2026.05.05 it fails to start
          # on ubuntu-latest, producing empty output.
          #
          # Capture the exit code without tripping the shell's `set -e`. If the
          # agent fails before finishing its MCP submission, the pre-seeded
          # structured artifact remains status=error.
          cursor-agent \
            --print \
            --trust \
            --approve-mcps \
            --model "$MODEL" \
            < /tmp/prompt.txt \
            > /tmp/review-raw.txt 2>/tmp/review-stderr.txt \
            && CURSOR_EXIT=0 || CURSOR_EXIT=$?
          echo "$CURSOR_EXIT" > /tmp/review-exit-code
          echo "cursor-agent exit code: $CURSOR_EXIT"

          echo "=== Raw output (first 500 chars) ==="
          head -c 500 /tmp/review-raw.txt
          echo ""
          echo "=== Stderr ==="
          cat /tmp/review-stderr.txt

      - name: Show structured findings
        if: always()
        run: |
          echo "=== Structured findings ==="
          cat /tmp/findings-out/findings.json
          echo ""

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: findings-${{ matrix.review_type }}-${{ matrix.model }}
          path: /tmp/findings-out/findings.json
          if-no-files-found: error
          retention-days: 7

  consolidate:
    # Adjudicates the 8 cell artifacts into one consolidated review.
    # Calls cursor-agent one more time as the judge, with prompt-judge.md.
    name: Consolidate panel
    needs: [gate, diff-size, preflight, review]
    if: always() && needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true' && needs.diff-size.outputs.within_cap == 'true' && needs.review.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Load cursor-review assets
        uses: actions/checkout@v6
        with:
          repository: Comfy-Org/github-workflows
          ref: ${{ inputs.workflows_ref }}
          path: _cursor_review_assets
          persist-credentials: false

      - name: Generate diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # See diff_excludes input for the rationale and pathspec list.
          # shellcheck disable=SC2086
          git diff "$BASE_SHA...$HEAD_SHA" -- . $DIFF_EXCLUDES > /tmp/pr-diff.patch

      - name: Install Cursor agent CLI
        run: |
          curl https://cursor.com/install -fsSL | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Download panel findings
        uses: actions/download-artifact@v8
        with:
          path: /tmp/panel
          pattern: findings-*

      - name: Configure structured final review
        run: |
          python3 "$CURSOR_REVIEW_ASSETS/review-output-mcp.py" \
            --mode judge \
            --out /tmp/judge-findings.json \
            --model "$JUDGE_MODEL" \
            --review-type judge \
            --init

          rm -rf -- .cursor
          mkdir -m 700 .cursor
          python3 - <<'PY'
          import json, os, sys, tempfile

          if os.path.islink(".cursor"):
              raise SystemExit("Refusing to write Cursor config through a symlinked .cursor directory")

          config = {
              "mcpServers": {
                  "cursor-review-output": {
                      "type": "stdio",
                      "command": sys.executable,
                      "args": [
                          os.path.join(os.environ["CURSOR_REVIEW_ASSETS"], "review-output-mcp.py"),
                          "--mode", "judge",
                          "--out", "/tmp/judge-findings.json",
                          "--model", os.environ["JUDGE_MODEL"],
                          "--review-type", "judge",
                      ],
                  }
              }
          }
          cli_config = {
              "permissions": {
                  "allow": [
                      "Mcp(cursor-review-output:cursor_review_submit_final)",
                  ],
                  "deny": [],
              }
          }
          for filename, value in (("mcp.json", config), ("cli.json", cli_config)):
              fd, temporary = tempfile.mkstemp(dir=".cursor", prefix=f".{filename}-")
              with os.fdopen(fd, "w", encoding="utf-8") as output:
                  json.dump(value, output)
              os.replace(temporary, os.path.join(".cursor", filename))
          PY

      - name: Aggregate panel findings
        id: aggregate
        env:
          PANEL_MODELS: ${{ needs.preflight.outputs.models }}
        run: |
          # Each artifact directory contains one findings.json. Combine into
          # a single panel.json array preserving cell metadata.
          python3 - <<'PY'
          import json, os, glob

          panel = []
          for path in sorted(glob.glob("/tmp/panel/findings-*/findings.json")):
              with open(path, encoding="utf-8") as f:
                  panel.append(json.load(f))

          expected = {
              (model, review_type)
              for model in json.loads(os.environ["PANEL_MODELS"])
              for review_type in ("adversarial", "edge-case")
          }
          present = {
              (cell.get("model"), cell.get("review_type"))
              for cell in panel
          }
          for model, review_type in sorted(expected - present):
              panel.append({
                  "model": model,
                  "review_type": review_type,
                  "status": "error",
                  "error": "Cell findings artifact was not uploaded.",
                  "findings": [],
              })

          with open("/tmp/panel.json", "w", encoding="utf-8") as f:
              json.dump(panel, f, indent=2)

          ok = sum(1 for c in panel if c.get("status") == "ok")
          print(f"Panel: {ok}/{len(panel)} cells contributed findings.")

          # Emit metadata for the next step to gate on.
          with open(os.environ["GITHUB_OUTPUT"], "a") as g:
              g.write(f"ok_count={ok}\n")
              g.write(f"total={len(panel)}\n")
          PY

      - name: Build judge prompt
        if: steps.aggregate.outputs.ok_count != '0'
        run: |
          {
            cat "$CURSOR_REVIEW_ASSETS/prompt-judge.md"
            cat /tmp/panel.json
            echo ""
            echo "=== END PANEL FINDINGS ==="
            echo ""
            echo "=== BEGIN DIFF ==="
            cat /tmp/pr-diff.patch
            echo ""
            echo "=== END DIFF ==="
          } > /tmp/judge-prompt.txt

          echo "Judge prompt size: $(wc -c < /tmp/judge-prompt.txt) bytes"

      - name: Run judge
        if: steps.aggregate.outputs.ok_count != '0'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          cursor-agent \
            --print \
            --trust \
            --approve-mcps \
            --model "$JUDGE_MODEL" \
            < /tmp/judge-prompt.txt \
            > /tmp/judge-raw.txt 2>/tmp/judge-stderr.txt || true

          echo "=== Judge raw output (first 1000 chars) ==="
          head -c 1000 /tmp/judge-raw.txt
          echo ""
          echo "=== Judge stderr ==="
          cat /tmp/judge-stderr.txt

          echo "=== Structured final review ==="
          cat /tmp/judge-findings.json
          echo ""

      - name: Build consolidated findings file
        id: consolidated
        env:
          OK_COUNT: ${{ steps.aggregate.outputs.ok_count }}
        run: |
          # If no cells completed, short-circuit — post-review.py will render
          # a "no contributors" review with the panel summary. Otherwise the
          # judge's MCP tool has already written /tmp/judge-findings.json.
          if [ "$OK_COUNT" = "0" ]; then
            echo "No panel cells contributed findings — skipping judge."
            echo '{"status": "ok", "findings": []}' > /tmp/judge-findings.json
          fi

          # If the judge did not call its final-review tool, surface that to
          # the next step rather than silently claiming "no findings".
          JUDGE_STATUS=$(python3 -c "import json,sys; print(json.load(open('/tmp/judge-findings.json')).get('status','?'))")
          echo "Judge status: $JUDGE_STATUS"
          echo "judge_status=$JUDGE_STATUS" >> "$GITHUB_OUTPUT"

          # Combine judge findings with panel metadata (model, review_type,
          # status only — drop full per-cell findings to keep the post payload
          # small) for the post-review script. If the judge did not submit,
          # fall back to the raw per-cell findings so the run still surfaces
          # what the panel found.
          python3 - <<'PY'
          import json, os

          with open("/tmp/panel.json", encoding="utf-8") as f:
              panel = json.load(f)
          panel_meta = [
              {"model": c.get("model"), "review_type": c.get("review_type"), "status": c.get("status")}
              for c in panel
          ]
          with open("/tmp/judge-findings.json", encoding="utf-8") as f:
              judge = json.load(f)

          degraded = judge.get("status") != "ok"
          if not degraded:
              findings = judge.get("findings") or []
          else:
              # Judge unusable — union the per-cell findings, deduping identical
              # (file, line, body) across cells to cut the obvious cross-cell
              # repetition the judge would normally collapse.
              seen, findings = set(), []
              for cell in panel:
                  if cell.get("status") != "ok":
                      continue
                  for fnd in cell.get("findings") or []:
                      if not isinstance(fnd, dict):
                          continue
                      key = (fnd.get("file"), fnd.get("line"), fnd.get("body"))
                      if key in seen:
                          continue
                      seen.add(key)
                      findings.append(fnd)

          consolidated = {"findings": findings, "panel": panel_meta}
          with open("/tmp/consolidated.json", "w", encoding="utf-8") as f:
              json.dump(consolidated, f)

          with open(os.environ["GITHUB_OUTPUT"], "a") as g:
              g.write(f"consolidated_count={len(findings)}\n")
              g.write(f"degraded={'true' if degraded else 'false'}\n")
          print(
              f"Consolidated: {len(findings)} finding(s) "
              f"({'degraded panel fallback' if degraded else 'judge-adjudicated'}), "
              f"{len(panel_meta)} panel cells."
          )
          PY

      - name: Resolve triggerer
        id: triggerer
        env:
          GH_ACTOR: ${{ github.actor }}
          PR_ASSIGNEES: ${{ toJSON(github.event.pull_request.assignees.*.login) }}
        run: |
          # github.actor on pull_request.labeled is the user who applied the
          # label — but when the auto-labeler workflow applies it via a bot
          # App token, github.actor becomes "<app>[bot]" and the human who
          # actually triggered the chain (by assigning themselves) is lost.
          # Recover them by falling back to the PR's first assignee whenever
          # the actor is a bot.
          if [[ "$GH_ACTOR" == *"[bot]" ]]; then
            FALLBACK=$(echo "$PR_ASSIGNEES" | jq -r '.[0] // empty')
            if [ -n "$FALLBACK" ]; then
              echo "Actor $GH_ACTOR is a bot — using assignee '$FALLBACK' for attribution."
              echo "triggered_by=$FALLBACK" >> "$GITHUB_OUTPUT"
            else
              echo "Actor $GH_ACTOR is a bot and no assignee found — keeping bot attribution."
              echo "triggered_by=$GH_ACTOR" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "triggered_by=$GH_ACTOR" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint bot-identity token (optional)
        id: bot_token
        if: ${{ inputs.bot_app_id != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ inputs.bot_app_id }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Post review
        env:
          # Dedicated bot identity when configured (bot_app_id), else github-actions[bot].
          GH_TOKEN: ${{ steps.bot_token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TRIGGERED_BY: ${{ steps.triggerer.outputs.triggered_by }}
          JUDGE_STATUS: ${{ steps.consolidated.outputs.judge_status }}
          CONSOLIDATED_COUNT: ${{ steps.consolidated.outputs.consolidated_count }}
        run: |
          # Three cases:
          # 1. Judge ok                       → normal consolidated review.
          # 2. Judge failed, panel has findings → post the raw per-cell findings
          #    with a notice banner (degraded, but NOT a bare "Review failed").
          # 3. Judge failed, no findings       → honest error review.
          if [ "$JUDGE_STATUS" = "ok" ]; then
            python3 "$CURSOR_REVIEW_ASSETS/post-review.py" \
              --findings /tmp/consolidated.json \
              --pr-number "$PR_NUMBER" \
              --repo "$REPO" \
              --commit-sha "$HEAD_SHA" \
              --triggered-by "$TRIGGERED_BY"
          elif [ "${CONSOLIDATED_COUNT:-0}" != "0" ]; then
            JUDGE_ERROR=$(python3 -c "import json; print(json.load(open('/tmp/judge-findings.json')).get('error','(no error message)'))")
            python3 "$CURSOR_REVIEW_ASSETS/post-review.py" \
              --findings /tmp/consolidated.json \
              --pr-number "$PR_NUMBER" \
              --repo "$REPO" \
              --commit-sha "$HEAD_SHA" \
              --triggered-by "$TRIGGERED_BY" \
              --notice "⚠️ The judge step did not submit a final review through its structured-output tool (status=${JUDGE_STATUS}). The findings below are the raw, un-adjudicated panel output — they may contain duplicates or false positives the judge would normally filter."
          else
            JUDGE_ERROR=$(python3 -c "import json; print(json.load(open('/tmp/judge-findings.json')).get('error','(no error message)'))")
            python3 "$CURSOR_REVIEW_ASSETS/post-review.py" \
              --findings /tmp/consolidated.json \
              --pr-number "$PR_NUMBER" \
              --repo "$REPO" \
              --commit-sha "$HEAD_SHA" \
              --triggered-by "$TRIGGERED_BY" \
              --error-message "Judge call failed (status=${JUDGE_STATUS}): ${JUDGE_ERROR}"
          fi

  notify-start:
    name: Notify start
    needs: [gate, diff-size]
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true' && needs.diff-size.outputs.within_cap == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Load cursor-review assets
        uses: actions/checkout@v6
        with:
          repository: Comfy-Org/github-workflows
          ref: ${{ inputs.workflows_ref }}
          path: _cursor_review_assets
          persist-credentials: false

      - name: Resolve triggerer
        id: triggerer
        env:
          GH_ACTOR: ${{ github.actor }}
          PR_ASSIGNEES: ${{ toJSON(github.event.pull_request.assignees.*.login) }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$GH_ACTOR" == *"[bot]" ]]; then
            ASSIGNEE=$(echo "$PR_ASSIGNEES" | jq -r '.[0] // empty')
            # Prefer PR author for DM routing — they opened the work and most want
            # the review status. Falls back to assignee, then empty (skips DM) if
            # the author is also a bot (e.g. Dependabot PRs).
            RESOLVED="${PR_AUTHOR:-${ASSIGNEE:-}}"
            if [[ "$RESOLVED" == *"[bot]" ]]; then RESOLVED=""; fi
            echo "triggered_by=$RESOLVED" >> "$GITHUB_OUTPUT"
          else
            echo "triggered_by=$GH_ACTOR" >> "$GITHUB_OUTPUT"
          fi

      - name: DM triggerer — review starting
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DM_GITHUB_USER: ${{ steps.triggerer.outputs.triggered_by }}
          # JSON GitHub-handle → email-prefix overrides, kept out of this public
          # repo. Set it as an org/repo Actions variable; absent = handle is used
          # as the email prefix verbatim.
          DM_EMAIL_MAP: ${{ vars.CURSOR_REVIEW_DM_EMAIL_MAP }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          chmod +x "$CURSOR_REVIEW_ASSETS/slack-notify.sh"
          MSG="*${PR_TITLE}*"$'\n'"${PR_URL}"$'\n'"8-cell panel running, then a judge consolidates."
          "$CURSOR_REVIEW_ASSETS/slack-notify.sh" \
            "warning" \
            "Cursor review starting" \
            "$MSG"

  notify-complete:
    name: Notify complete
    needs: [gate, diff-size, review, consolidate]
    if: always() && needs.gate.outputs.should_run == 'true' && needs.gate.outputs.already_reviewed != 'true' && needs.diff-size.outputs.within_cap == 'true' && needs.review.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Load cursor-review assets
        uses: actions/checkout@v6
        with:
          repository: Comfy-Org/github-workflows
          ref: ${{ inputs.workflows_ref }}
          path: _cursor_review_assets
          persist-credentials: false

      - name: Resolve triggerer
        id: triggerer
        env:
          GH_ACTOR: ${{ github.actor }}
          PR_ASSIGNEES: ${{ toJSON(github.event.pull_request.assignees.*.login) }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$GH_ACTOR" == *"[bot]" ]]; then
            ASSIGNEE=$(echo "$PR_ASSIGNEES" | jq -r '.[0] // empty')
            # Prefer PR author for DM routing — they opened the work and most want
            # the review status. Falls back to assignee, then empty (skips DM) if
            # the author is also a bot (e.g. Dependabot PRs).
            RESOLVED="${PR_AUTHOR:-${ASSIGNEE:-}}"
            if [[ "$RESOLVED" == *"[bot]" ]]; then RESOLVED=""; fi
            echo "triggered_by=$RESOLVED" >> "$GITHUB_OUTPUT"
          else
            echo "triggered_by=$GH_ACTOR" >> "$GITHUB_OUTPUT"
          fi

      - name: DM triggerer — review complete
        continue-on-error: true
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          DM_GITHUB_USER: ${{ steps.triggerer.outputs.triggered_by }}
          # See notify-start: JSON handle → email-prefix overrides, supplied as
          # an org/repo Actions variable so the roster stays out of this repo.
          DM_EMAIL_MAP: ${{ vars.CURSOR_REVIEW_DM_EMAIL_MAP }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          CONSOLIDATE_RESULT: ${{ needs.consolidate.result }}
        run: |
          chmod +x "$CURSOR_REVIEW_ASSETS/slack-notify.sh"
          if [ "$CONSOLIDATE_RESULT" = "success" ]; then
            STATUS="success"
            TITLE="Cursor review complete"
            DETAIL="One consolidated review is on the PR."
          else
            STATUS="warning"
            TITLE="Cursor review failed to post"
            DETAIL="Consolidate step did not succeed — see the run for details."
          fi
          MSG="*${PR_TITLE}*"$'\n'"${PR_URL}"$'\n'"${DETAIL}"
          "$CURSOR_REVIEW_ASSETS/slack-notify.sh" \
            "$STATUS" \
            "$TITLE" \
            "$MSG"
