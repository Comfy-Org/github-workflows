name: Bump cursor-review callers

# When cursor-review.yml is updated on main, open a SHA-bump PR in every repo
# that pins a caller against it. PRs are opened by Cloud Code Bot so they are
# easy to filter and merge.
#
# The caller list is NOT hardcoded here. This repo is PUBLIC (workflow file and
# Actions run logs are both publicly viewable), and most callers are private, so
# their names must never appear in this file or its logs. The list lives in the
# repo-level Actions variable `CURSOR_REVIEW_CALLERS` (config, not a credential —
# a variable, not a secret, since secrets are write-only via the API) as a JSON
# array of {"repo","file","label"} objects. Every repo name is `::add-mask::`ed
# out of the (public) run logs before it is ever echoed.
#
# Update flow — adding/removing a caller needs NO public commit:
#   gh variable set CURSOR_REVIEW_CALLERS --repo Comfy-Org/github-workflows \
#     --body "$(jq -c . callers.json)"
# Keep the canonical callers.json in a PRIVATE infra/ops repo so variable edits
# have a reviewed source of truth; the org audit log records each edit. (The
# specific home repo is intentionally not named here — this file is public.)

on:
  workflow_dispatch: {}   # allow on-demand runs (e.g. to re-bump callers)
  push:
    branches: [main]
    paths:
      - .github/workflows/cursor-review.yml

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Cloud Code Bot token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.CLOUD_CODE_BOT_PRIVATE_KEY }}
          owner: Comfy-Org

      - name: Bump SHA in caller repos
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          NEW_SHA: ${{ github.sha }}
          # JSON array of {"repo","file","label"} — see the header comment for the
          # update flow. Kept in a variable (not the file) so private caller names
          # never land in this public repo or its logs.
          CALLERS_JSON: ${{ vars.CURSOR_REVIEW_CALLERS }}
        run: |
          # NOTE: deliberately no `set -e`. Each caller is bumped independently
          # in bump_one(); a failure there returns non-zero and is downgraded to
          # a per-repo warning so one bad repo cannot abort the whole fan-out.
          # We still fail the job at the end if any repo failed.
          set -uo pipefail
          SHORT="${NEW_SHA:0:7}"
          BRANCH="ci/bump-cursor-review-${SHORT}"

          # Load the caller list from the CURSOR_REVIEW_CALLERS variable. Hard-fail
          # loudly on a missing/empty/invalid value — a silent no-op dispatcher
          # (which would leave every caller un-bumped without anyone noticing) must
          # not be possible.
          if [[ -z "${CALLERS_JSON//[[:space:]]/}" ]]; then
            echo "::error::CURSOR_REVIEW_CALLERS variable is missing or empty. Seed it with the caller list — see this workflow's header comment for the update flow."
            exit 1
          fi
          if ! jq -e 'type == "array" and length > 0 and all(.[]; (.repo | type == "string" and . != "") and (.file | type == "string" and . != ""))' <<<"$CALLERS_JSON" >/dev/null 2>&1; then
            echo "::error::CURSOR_REVIEW_CALLERS is not a non-empty JSON array of {repo,file,label} objects (each needing a non-empty repo and file). Fix the variable — see the workflow header."
            exit 1
          fi

          # Parse the JSON into repo|file|label tuples, and mask every repo name in
          # the (publicly viewable) run logs BEFORE the loop that echoes it, so all
          # per-repo output shows *** instead of a private repo name.
          CALLERS=()
          while IFS= read -r ENTRY; do
            echo "::add-mask::${ENTRY%%|*}"
            CALLERS+=("$ENTRY")
          done < <(jq -r '.[] | "\(.repo)|\(.file)|\(.label // "")"' <<<"$CALLERS_JSON")

          if (( ${#CALLERS[@]} == 0 )); then
            echo "::error::CURSOR_REVIEW_CALLERS parsed to zero callers — refusing to run a no-op dispatcher."
            exit 1
          fi

          # Bump a single caller repo. Every external call is guarded, so a bad
          # repo returns non-zero here (caught by the loop) instead of killing
          # the run. An expected skip (file missing / already pinned) is a
          # successful `return 0`.
          bump_one() {
            local ENTRY="$1" REPO FILE LABEL FILE_ENC
            REPO=$(cut -d'|' -f1 <<<"$ENTRY")
            FILE=$(cut -d'|' -f2 <<<"$ENTRY")
            LABEL=$(cut -d'|' -f3 <<<"$ENTRY")
            FILE_ENC="${FILE//\//%2F}"

            local DEFAULT_BRANCH
            DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch') || {
              echo "::warning::${REPO}: cannot read repo metadata — skipping"
              return 1
            }

            # Fetch current file; a missing file is an expected skip (success).
            local CURRENT
            CURRENT=$(gh api "repos/${REPO}/contents/${FILE_ENC}?ref=${DEFAULT_BRANCH}" 2>/dev/null) || {
              echo "::warning::${REPO}: ${FILE} not found — skipping"
              return 0
            }

            local BLOB_SHA OLD_CONTENT
            BLOB_SHA=$(jq -r '.sha' <<<"$CURRENT")
            OLD_CONTENT=$(jq -r '.content' <<<"$CURRENT" | base64 -d)

            # Already pinned to this SHA → nothing to do (success).
            if grep -qF "$NEW_SHA" <<<"$OLD_CONTENT"; then
              echo "${REPO}: already at ${SHORT} — skipping"
              return 0
            fi

            # Replace every 40-char hex SHA and update the inline comment.
            local NEW_CONTENT
            NEW_CONTENT=$(sed -E "s/[0-9a-f]{40}/${NEW_SHA}/g; s|# github-workflows#[0-9]+|# github-workflows main (${SHORT})|g" <<<"$OLD_CONTENT")

            # Create the branch from the default-branch tip (ignore 422 if it exists).
            local MAIN_SHA
            MAIN_SHA=$(gh api "repos/${REPO}/git/refs/heads/${DEFAULT_BRANCH}" --jq '.object.sha') || {
              echo "::warning::${REPO}: cannot read ${DEFAULT_BRANCH} ref — skipping"
              return 1
            }
            gh api --method POST "repos/${REPO}/git/refs" \
              --field ref="refs/heads/${BRANCH}" \
              --field sha="${MAIN_SHA}" 2>/dev/null || true

            # Commit the updated file onto the branch. `$(...)` capture above
            # (base64 -d, then sed) strips the file's trailing newline, so
            # printf '%s\n' restores exactly one — otherwise the committed
            # caller loses its EOF newline and trips the receiver repo's
            # formatter (oxfmt/prettier both require a trailing newline).
            local ENCODED
            ENCODED=$(printf '%s\n' "$NEW_CONTENT" | base64 | tr -d '\n')
            gh api --method PUT "repos/${REPO}/contents/${FILE_ENC}" \
              --field message="ci: bump cursor-review to github-workflows@${SHORT}" \
              --field content="${ENCODED}" \
              --field sha="${BLOB_SHA}" \
              --field branch="${BRANCH}" \
              > /dev/null || {
              echo "::warning::${REPO}: commit to ${BRANCH} failed — skipping"
              return 1
            }

            local LABEL_ARGS=()
            [[ -n "$LABEL" ]] && LABEL_ARGS=(--label "$LABEL")

            # Open the PR (a pre-existing PR for this branch is not an error).
            if gh pr create \
              --repo "${REPO}" \
              --head "${BRANCH}" \
              --base "${DEFAULT_BRANCH}" \
              --title "ci: bump cursor-review to github-workflows@${SHORT}" \
              --body "Automatic SHA bump — \`cursor-review.yml\` was updated in \`Comfy-Org/github-workflows\` at [\`${SHORT}\`](https://github.com/Comfy-Org/github-workflows/commit/${NEW_SHA}). _Opened by the \`bump-cursor-review-callers\` workflow._" \
              "${LABEL_ARGS[@]}" 2>/dev/null; then
              echo "${REPO}: PR opened"
            else
              echo "::warning::${REPO}: PR may already exist for ${BRANCH}"
            fi
            return 0
          }

          FAILED=()
          for ENTRY in "${CALLERS[@]}"; do
            bump_one "$ENTRY" || FAILED+=("${ENTRY%%|*}")
          done

          if (( ${#FAILED[@]} )); then
            printf '::error::bump failed for %d repo(s): %s\n' "${#FAILED[@]}" "${FAILED[*]}"
            exit 1
          fi
          echo "cursor-review bump complete for all callers."
