name: Bump cursor-review callers

# When cursor-review.yml is updated on main, open a SHA-bump PR in every repo
# that pins a caller against it. PRs are opened by Cloud Code Bot so they are
# easy to filter and merge.
#
# This is a thin entrypoint over the shared bumper at
# .github/bump-callers/bump-callers.sh — the same script drives the
# agents-md-integrity and pr-size caller fleets (bump-agents-md-callers.yml,
# bump-pr-size-callers.yml). Keeping ONE implementation is deliberate: a forked
# copy is how other shared machinery in the org has drifted. The entrypoints
# differ only in their path-filter trigger and the three parameters passed
# below.
#
# The caller list is NOT hardcoded here. This repo is PUBLIC (workflow file and
# Actions run logs are both publicly viewable), and most callers are private, so
# their names must never appear in this file or its logs. The list lives in the
# repo-level Actions variable `CURSOR_REVIEW_CALLERS` (config, not a credential —
# a variable, not a secret, since secrets are write-only via the API) as a JSON
# array of {"repo","file","label","wire_bot"} objects. Every repo name is
# `::add-mask::`ed out of the (public) run logs before it is ever echoed.
#
# A caller flagged `"wire_bot": true` also gets the cloud-code-bot review
# identity wired in the same PR (BE-1814): the optional bot_app_id input +
# BOT_APP_PRIVATE_KEY secret the reusable workflow gained in Story 1.1 (PR #13),
# mapped to the creds those repos already hold (vars.APP_ID /
# secrets.CLOUD_CODE_BOT_PRIVATE_KEY). Injection is idempotent — see
# .github/cursor-review/wire-bot-identity.py — so an already-wired caller only
# gets the SHA bump. Flag only callers with the creds provisioned; one without
# them still degrades safely to github-actions[bot] (non-breaking, incremental
# rollout) — flagging one anyway would just be misleading, not unsafe. This is
# cursor-review-specific, so WIRE_BOT_SCRIPT is set only here, never in
# bump-agents-md-callers.yml.
#
# Update flow — adding/removing a caller needs NO public commit:
#   gh variable set CURSOR_REVIEW_CALLERS --repo Comfy-Org/github-workflows \
#     --body "$(jq -c . callers.json)"
# Keep the canonical callers.json in a PRIVATE infra/ops repo so variable edits
# have a reviewed source of truth; the org audit log records each edit. (The
# specific home repo is intentionally not named here — this file is public.)

on:
  workflow_dispatch: {}   # allow on-demand runs (e.g. to re-bump callers)
  push:
    branches: [main]
    paths:
      - .github/workflows/cursor-review.yml
      # The prompts + scripts consumers actually run live here, loaded from the
      # `workflows_ref` SHA a caller pins (see cursor-review.yml's header) — a
      # behavior change here (e.g. extract-findings.py parsing) needs the same
      # caller bump as a workflow-file change, or pinned callers silently drift
      # onto stale review behavior.
      - .github/cursor-review/**

permissions:
  contents: read

# Serialize runs of this fleet. The bumper now pushes to a STABLE branch
# (ci/bump-cursor-review) shared across runs, so two overlapping runs (a rapid
# second main push, or a push racing a manual re-run) would force-reset that
# branch and race the PR update — an older run finishing last could leave the
# committed diff pinned to a stale SHA. cancel-in-progress: false lets the
# running bump finish; GitHub keeps only the newest pending run, so the latest
# SHA always wins (BE-3882).
concurrency:
  group: bump-cursor-review-callers
  cancel-in-progress: false

jobs:
  bump:
    # Guard against a workflow_dispatch run from a non-main ref: github.sha is
    # the tip of whatever ref was selected, and the bumper force-resets a stable
    # shared branch — a manual run from an older ref would pin every caller to a
    # stale SHA (and run this job's script, with the App token minted below,
    # from an unreviewed commit). The push trigger is already main-only, so this
    # only ever skips stray manual runs.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Generate Cloud Code Bot token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.CLOUD_CODE_BOT_PRIVATE_KEY }}
          owner: Comfy-Org

      - name: Bump SHA in caller repos
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          NEW_SHA: ${{ github.sha }}
          VAR_NAME: CURSOR_REVIEW_CALLERS
          TAG: cursor-review
          WORKFLOW_FILE: cursor-review.yml
          # JSON array of {"repo","file","label","wire_bot"} — see the header
          # comment for the update flow. Kept in a variable (not the file) so
          # private caller names never land in this public repo or its logs.
          CALLERS_JSON: ${{ vars.CURSOR_REVIEW_CALLERS }}
          # Only this fleet's callers ever carry `wire_bot` (BE-1814) — the
          # agents-md-integrity entrypoint never sets this, so bump-callers.sh
          # skips wiring there even if its variable somehow set the flag.
          WIRE_BOT_SCRIPT: ${{ github.workspace }}/.github/cursor-review/wire-bot-identity.py
        run: |
          # The push path filter also matches a commit that DELETES the
          # reusable workflow; bumping callers to a SHA where the file is gone
          # would break every caller. Deletion means decommissioning — no-op.
          if [[ ! -f .github/workflows/cursor-review.yml ]]; then
            echo "cursor-review.yml absent at this SHA — decommissioned; nothing to bump"
            exit 0
          fi
          bash .github/bump-callers/bump-callers.sh
