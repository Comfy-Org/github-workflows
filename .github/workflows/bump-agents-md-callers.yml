name: Bump agents-md-integrity callers

# When the agents-md-integrity reusable workflow (or its checker script) is
# updated on main, open a SHA-bump PR in every repo that pins a caller against
# it. PRs are opened by Cloud Code Bot so they are easy to filter and merge.
#
# This is a thin entrypoint over the shared bumper at
# .github/bump-callers/bump-callers.sh — the same script drives the
# cursor-review and pr-size caller fleets (bump-cursor-review-callers.yml,
# bump-pr-size-callers.yml). Keeping ONE implementation is deliberate: a forked
# copy is how other shared machinery in the org has drifted. The entrypoints
# differ only in their path-filter trigger and the three parameters passed
# below. (They stay separate rather than a single matrix
# because their triggers differ — a cursor-review.yml change must not spuriously
# bump agents-md callers, and vice versa.)
#
# The caller list is NOT hardcoded here. This repo is PUBLIC (workflow file and
# Actions run logs are both publicly viewable), and most callers are private, so
# their names must never appear in this file or its logs. The list lives in the
# repo-level Actions variable `AGENTS_MD_CALLERS` (config, not a credential — a
# variable, not a secret, since secrets are write-only via the API) as a JSON
# array of {"repo","file","label"} objects, same shape as CURSOR_REVIEW_CALLERS.
# Every repo name is `::add-mask::`ed out of the (public) run logs before it is
# ever echoed. The variable is seeded EMPTY (`[]`) — an empty list is a clean
# no-op here (ALLOW_EMPTY below); the rollout's per-repo caller tickets add
# entries as callers land.
#
# Update flow — adding/removing a caller needs NO public commit:
#   gh variable set AGENTS_MD_CALLERS --repo Comfy-Org/github-workflows \
#     --body "$(jq -c . callers.json)"
# Keep the canonical callers.json in a PRIVATE infra/ops repo so variable edits
# have a reviewed source of truth; the org audit log records each edit. (The
# specific home repo is intentionally not named here — this file is public.)

on:
  workflow_dispatch: {}   # allow on-demand runs (e.g. to re-bump callers)
  push:
    branches: [main]
    paths:
      - .github/workflows/agents-md-integrity.yml
      - .github/agents-md-integrity/**

permissions:
  contents: read

# Serialize runs of this fleet. The bumper now pushes to a STABLE branch
# (ci/bump-agents-md-integrity) shared across runs, so two overlapping runs (a
# rapid second main push, or a push racing a manual re-run) would force-reset
# that branch and race the PR update — an older run finishing last could leave
# the committed diff pinned to a stale SHA. cancel-in-progress: false lets the
# running bump finish; GitHub keeps only the newest pending run, so the latest
# SHA always wins (BE-3882).
concurrency:
  group: bump-agents-md-callers
  cancel-in-progress: false

jobs:
  bump:
    # Guard against a workflow_dispatch run from a non-main ref: github.sha is
    # the tip of whatever ref was selected, and the bumper force-resets a stable
    # shared branch — a manual run from an older ref would pin every caller to a
    # stale SHA (and run this job's script, with the App token minted below,
    # from an unreviewed commit). The push trigger is already main-only, so this
    # only ever skips stray manual runs.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Generate Cloud Code Bot token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.CLOUD_CODE_BOT_PRIVATE_KEY }}
          owner: Comfy-Org

      - name: Bump SHA in caller repos
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          NEW_SHA: ${{ github.sha }}
          VAR_NAME: AGENTS_MD_CALLERS
          TAG: agents-md-integrity
          WORKFLOW_FILE: agents-md-integrity.yml
          # Seeded empty; an empty list is a clean no-op, not an error.
          ALLOW_EMPTY: "true"
          # JSON array of {"repo","file","label"} — see the header comment for the
          # update flow. Kept in a variable (not the file) so private caller names
          # never land in this public repo or its logs.
          CALLERS_JSON: ${{ vars.AGENTS_MD_CALLERS }}
        run: |
          # The main-only ref guard above cannot catch a manual RE-RUN of an
          # older main run: github.ref is refs/heads/main but github.sha is
          # that run's original (now stale) commit, and the bumper would
          # force-repin every caller to it. Only act from the current tip —
          # any newer push has its own queued run that does the bump.
          main_tip=$(git ls-remote origin refs/heads/main | cut -f1)
          if [[ "$main_tip" != "$GITHUB_SHA" ]]; then
            echo "github.sha $GITHUB_SHA is not the current main tip ($main_tip) — stale run/re-run; nothing to bump"
            exit 0
          fi
          # The push path filter also matches a commit that DELETES the
          # reusable workflow — or the run-time assets callers load from the
          # pinned SHA (.github/agents-md-integrity/**); bumping callers to a
          # SHA where either is gone would break every caller. Deletion means
          # decommissioning — no-op.
          if [[ ! -f .github/workflows/agents-md-integrity.yml || ! -d .github/agents-md-integrity ]]; then
            echo "agents-md-integrity.yml or .github/agents-md-integrity/ absent at this SHA — decommissioned; nothing to bump"
            exit 0
          fi
          bash .github/bump-callers/bump-callers.sh
