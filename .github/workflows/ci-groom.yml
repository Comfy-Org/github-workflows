name: CI - Groom

# Thin caller enrolling THIS repo as the FIRST groom pilot (BE-3873 / Groom
# Phase 3). The groom logic (two-phase finder -> independent verifier audit, the
# durable dedup/rejection ledger, the GitHub-issue sink) lives in groom.yml in
# this same repo; the caller pins it by full commit SHA like every external
# consumer — a local `uses: ./...` path would run the PR's OWN copy of the
# auditor, letting a PR weaken the reviewer judging it. Named ci-groom.yml
# because the canonical caller path (groom.yml) is occupied here by the reusable
# itself (same reason as ci-cursor-review.yml / ci-detect-unreviewed-merge.yml).
#
# GROOMER-ONLY mode: groom only FINDS and FILES `groom`-labeled GitHub issues —
# no commits, no PRs, no auto-builder, never merges. It fires on a DAILY base
# cron (never on-PR), but the EFFECTIVE cadence is the runtime interval gate in
# the reusable (BE-4004): a tick within `GROOM_INTERVAL_DAYS` of the last real
# run no-ops cheaply before the finder ever spins up. Plus a manual dispatch
# carrying a `dry_run` toggle (which ALWAYS runs, bypassing the interval gate) so
# the audit + dedup can be spot-checked against a studio groom run on the same
# commit BEFORE trusting live filing (the Phase 3 dry-run parity gate).
#
# CADENCE KNOB (BE-4004): set repo Actions variable `GROOM_INTERVAL_DAYS`
# (default 7 = weekly, matching the original cron). Changing it retunes cadence
# (weekly -> every-3-days -> daily) with NO workflow-file edit:
#   gh variable set GROOM_INTERVAL_DAYS --repo Comfy-Org/github-workflows --body 3
#
# PREREQUISITE (operator): `secrets.ANTHROPIC_API_KEY` must be available to this
# repo (org- or repo-level) — the finder + verifier agents bill through it. Until
# it exists the run fails loudly at the agent step, deliberately, so the pilot is
# never silently inert. Filing uses the cloud-code-bot App identity (vars.APP_ID
# + secrets.CLOUD_CODE_BOT_PRIVATE_KEY — already provisioned here for
# cursor-review), so groom's issues are a distinct, queryable actor rather than
# github-actions[bot], and the caller needs no issues:write scope of its own.

on:
  schedule:
    # DAILY base tick at 09:17 UTC. Off-peak + a non-round minute to dodge the
    # top-of-hour GitHub scheduler congestion. Never fires on a PR. This is the
    # frequent base cron for the interval-gate pattern (GH Actions cron is static
    # in the file — there is no runtime "every N days"); the reusable's interval
    # gate turns this daily tick into an effective every-GROOM_INTERVAL_DAYS run.
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: >-
          Run the full audit + dedup but do NOT open issues — print what WOULD be
          filed to the job summary. Use it to spot-check parity against a studio
          groom run on the same repo/commit before trusting live filing.
        type: boolean
        default: false

# NOTE: intentionally NO caller-level `concurrency:` here. The reusable groom.yml
# already declares `concurrency: groom-${{ github.repository }}` (cancel-in-
# progress: false), which serializes runs per target repo across ALL callers —
# that is the real TOCTOU guard for the read-then-file dedup ledger. Duplicating
# the identical group in this caller would DEADLOCK the run: the caller holds the
# group while its reusable `uses:` job waits to acquire the SAME group with
# cancel-in-progress:false, so the reusable never gets the slot and the run hangs
# until timeout (GitHub Actions caller/callee same-group deadlock). Serialization
# lives in the reusable; the caller deliberately stays out of the group.

jobs:
  groom:
    permissions:
      # Least privilege: the App token (bot_app_id) does the issue I/O, so the
      # caller's own github.token stays read-only. (Grant issues:write here ONLY
      # if you drop bot_app_id and fall back to filing as github-actions[bot].)
      contents: read
      # REQUIRED for the interval gate (BE-4004): the reusable reads this repo's
      # Actions run history to find the last real groom run. A reusable workflow's
      # token is capped by the caller's grant, so without this the gate fails open
      # (runs every daily tick, over-spending).
      actions: read
    # ⚠️ BUMP-AT-MERGE (BE-4004): this pin (and workflows_ref below) must point at
    # THIS PR's squash-merge SHA — the interval gate lives in the NEW groom.yml,
    # so the placeholder below fails LOUD (unresolvable ref) until bumped, exactly
    # the reusable-lands-then-bump-caller two-step the pilot used (#49 -> #53).
    # After merge:  gh api ... / edit both refs to the merge commit SHA.
    uses: Comfy-Org/github-workflows/.github/workflows/groom.yml@REPLACE_AT_MERGE_WITH_THIS_PRS_SQUASH_SHA # BE-4004 interval gate — bump to merge SHA
    with:
      # File groom's issues as cloud-code-bot (App token), not github-actions[bot].
      bot_app_id: ${{ vars.APP_ID }}
      # Keep the assets ref (finder/verifier briefs + interval gate + dedup
      # ledger) in lock-step with the `uses:` ref above, so a run always loads the
      # scripts that match the workflow filing them. BUMP-AT-MERGE with `uses:`.
      workflows_ref: REPLACE_AT_MERGE_WITH_THIS_PRS_SQUASH_SHA
      # Manual dispatch can dry-run; the daily schedule always files live
      # (github.event.inputs is null on a schedule event -> '' != 'true' -> false).
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
      # Effective cadence knob (BE-4004): the daily base cron only produces a real
      # run every GROOM_INTERVAL_DAYS days. Re-evaluated each run, so changing the
      # variable retunes cadence with no file edit. Unset -> 7 (weekly), today.
      interval_days: ${{ vars.GROOM_INTERVAL_DAYS || '7' }}
      # Match the volume-gate window to that same effective cadence, not the daily
      # base cron — so the merge-activity check spans how often a real run happens.
      cadence: ${{ vars.GROOM_INTERVAL_DAYS || '7' }}
      # A dry-run is the Phase 3 parity spot-check, so it must ALWAYS exercise the
      # full audit + dedup — bypass the volume gate when dispatched with
      # dry_run:true. Otherwise a quiet window (nothing merged in `cadence` days)
      # would gate the dry-run to nothing and print no parity summary, defeating
      # the dispatch's whole purpose. Live runs (the daily schedule, where inputs
      # is null -> '' != 'true' -> true, or a dry_run:false dispatch) keep the gate
      # on so a quiescent repo still skips the spend. (Note: a schedule tick still
      # passes the interval gate first — the volume gate is the second throttle.)
      volume_gate: ${{ github.event.inputs.dry_run != 'true' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.CLOUD_CODE_BOT_PRIVATE_KEY }}
