name: Detect Unreviewed Merge (reusable)

# Reusable workflow called by source repos. The caller controls the trigger
# (push to main/master) and concurrency; this workflow does the detection
# and tracking-issue creation.
#
# Caller pattern (place in source repo at .github/workflows/detect-unreviewed-merge.yml):
#
#   name: Detect Unreviewed Merge
#   on:
#     push:
#       branches: [main, master]
#   concurrency:
#     group: detect-unreviewed-merge-${{ github.sha }}
#     cancel-in-progress: false
#   jobs:
#     detect:
#       uses: Comfy-Org/unreviewed-merges/.github/workflows/detector.yml@v1
#       with:
#         approval-mode: latest-per-reviewer  # or 'any-approval' for private repos
#       secrets:
#         UNREVIEWED_MERGES_TOKEN: ${{ secrets.UNREVIEWED_MERGES_TOKEN }}

on:
  workflow_call:
    inputs:
      approval-mode:
        description: >-
          'latest-per-reviewer' (default, for OSS repos with "dismiss stale reviews on
          new commits" enabled — dismissed approvals do NOT count) or 'any-approval'
          (for private repos without stale-dismissal — any historical APPROVED counts).
        type: string
        required: false
        default: latest-per-reviewer
    secrets:
      UNREVIEWED_MERGES_TOKEN:
        description: Fine-grained PAT with issues:write on Comfy-Org/unreviewed-merges
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Check for unreviewed merge
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          UNREVIEWED_MERGES_TOKEN: ${{ secrets.UNREVIEWED_MERGES_TOKEN }}
          APPROVAL_MODE: ${{ inputs.approval-mode }}
        with:
          script: |
            const sha = context.sha;
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const approvalMode = process.env.APPROVAL_MODE || 'latest-per-reviewer';

            if (!['latest-per-reviewer', 'any-approval'].includes(approvalMode)) {
              core.setFailed(`Invalid approval-mode: ${approvalMode}. Use 'latest-per-reviewer' or 'any-approval'.`);
              return;
            }

            // Find the PR associated with this merge commit. The
            // listPullRequestsAssociatedWithCommit endpoint is eventually
            // consistent — for a few seconds after a merge it can return [].
            // Retry with backoff, then fall back to parsing the PR number
            // from the squash/merge commit message subject (always present
            // for PRs merged via the GitHub UI or `gh pr merge`).
            async function findPr() {
              for (let attempt = 0; attempt < 5; attempt++) {
                const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner, repo, commit_sha: sha,
                });
                const hit = prs.find(p => p.merged_at && p.base.ref === branch);
                if (hit) return hit;
                if (attempt < 4) {
                  await new Promise(r => setTimeout(r, (attempt + 1) * 5000));
                }
              }

              // Fallback: parse PR number from the commit message subject.
              // Squash merges:   "<title> (#1234)"
              // Merge commits:   "Merge pull request #1234 from <branch>"
              const { data: commit } = await github.rest.repos.getCommit({
                owner, repo, ref: sha,
              });
              const subject = commit.commit.message.split('\n', 1)[0];
              const m = subject.match(/\(#(\d+)\)\s*$/) ||
                        subject.match(/^Merge pull request #(\d+)\b/);
              if (!m) return null;

              const { data: prData } = await github.rest.pulls.get({
                owner, repo, pull_number: parseInt(m[1], 10),
              });
              if (prData.merged_at && prData.base.ref === branch) {
                core.info(`Resolved PR #${prData.number} via commit-message fallback`);
                return prData;
              }
              return null;
            }

            const pr = await findPr();
            if (!pr) {
              core.info('No merged PR found for this commit — skipping.');
              return;
            }

            core.info(`Found PR #${pr.number}: ${pr.title}`);

            // Fetch full PR to get merged_by (not in pull-request-simple schema)
            const { data: fullPr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pr.number,
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
            });

            let hasApproval;
            if (approvalMode === 'any-approval') {
              // Private repos without stale-dismissal: any historical APPROVED counts.
              hasApproval = reviews.some(r => r.state === 'APPROVED');
            } else {
              // OSS repos with stale-dismissal: take latest review per reviewer.
              // A DISMISSED state means the approval was invalidated by a later push.
              const latestByReviewer = new Map();
              for (const r of reviews) {
                if (!r.user || r.state === 'COMMENTED') continue;
                const prev = latestByReviewer.get(r.user.login);
                if (!prev || new Date(r.submitted_at) > new Date(prev.submitted_at)) {
                  latestByReviewer.set(r.user.login, r);
                }
              }
              hasApproval = Array.from(latestByReviewer.values()).some(
                r => r.state === 'APPROVED'
              );
            }

            if (hasApproval) {
              core.info('PR has an approving review — no action needed.');
              return;
            }

            core.info('No approving review found. Checking for inline justification...');

            // Search PR body and author comments for "Justification: <reason>"
            const pattern = /^justification:\s*(.+)$/im;
            let justification = null;

            if (pr.body) {
              const match = pr.body.match(pattern);
              if (match) justification = match[1].trim();
            }

            if (!justification) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
              });

              for (const c of comments) {
                if (c.user && pr.user && c.user.login === pr.user.login) {
                  const match = c.body.match(pattern);
                  if (match) {
                    justification = match[1].trim();
                    break;
                  }
                }
              }
            }

            const hasJustification = !!justification;
            core.info(hasJustification
              ? `Found inline justification: ${justification}`
              : 'No inline justification found.');

            // Build issue body
            const mergedBy = fullPr.merged_by ? fullPr.merged_by.login : 'unknown';
            const table = [
              '## Unreviewed Merge Detected',
              '',
              '| Field | Value |',
              '|-------|-------|',
              `| **Repository** | ${owner}/${repo} |`,
              `| **PR** | ${owner}/${repo}#${pr.number} |`,
              `| **Author** | @${pr.user.login} |`,
              `| **Merged by** | @${mergedBy} |`,
              `| **Merged at** | ${pr.merged_at} |`,
              `| **Branch** | ${branch} |`,
            ];

            const policyRef = [
              '## Policy reference',
              '',
              'Per the Secure Development Policy (Emergency Change Procedures), changes merged',
              'without prior approval must be justified and peer-reviewed within 1 business day.',
              'Unresolved items older than 3 days are escalated to engineering leadership.',
            ];

            let body;
            if (hasJustification) {
              body = [
                ...table,
                '',
                '## Justification (provided at merge time)',
                '',
                `> ${justification}`,
                '',
                '## Required actions',
                '',
                '- [x] **Justification** — Provided at merge time (see above)',
                '- [ ] **Post-merge review** — A peer must review the PR and comment confirmation here (within 1 business day)',
                '',
                'Once both items are checked, close this issue.',
                '',
                ...policyRef,
              ].join('\n');
            } else {
              body = [
                ...table,
                '',
                '## Required actions',
                '',
                '- [ ] **Justification** — Author must comment on this issue explaining why pre-merge approval was bypassed (within 1 business day)',
                '- [ ] **Post-merge review** — A peer must review the PR and comment confirmation here (within 1 business day)',
                '',
                'Once both items are checked, close this issue.',
                '',
                ...policyRef,
              ].join('\n');
            }

            // Create issue in the tracking repo with the dedicated PAT
            if (!process.env.UNREVIEWED_MERGES_TOKEN) {
              core.setFailed('UNREVIEWED_MERGES_TOKEN secret is not configured');
              return;
            }

            // actions/github-script exposes getOctokit on the `github` global —
            // require('@actions/github') is NOT resolvable from the inline-script
            // context (the action bundles the module but does not expose it
            // on the Node module-resolution path).
            const tracking = github.getOctokit(process.env.UNREVIEWED_MERGES_TOKEN);

            const repoLabel = `repo:${repo.toLowerCase()}`;
            const statusLabel = hasJustification ? 'needs-review' : 'needs-justification';

            // Idempotency check — avoid duplicate issues on workflow re-runs
            const { data: search } = await tracking.rest.search.issuesAndPullRequests({
              q: `repo:Comfy-Org/unreviewed-merges in:title "PR #${pr.number}" label:${repoLabel}`,
            });
            if (search.total_count > 0) {
              core.info(`Tracking issue already exists: ${search.items[0].html_url}`);
              return;
            }

            let issue;
            try {
              issue = await tracking.rest.issues.create({
                owner: 'Comfy-Org',
                repo: 'unreviewed-merges',
                title: `[${repo}] PR #${pr.number} — ${pr.title}`,
                body,
                labels: ['unreviewed-merge', statusLabel, repoLabel],
                assignees: [pr.user.login],
              });
            } catch (e) {
              if (e.status === 422) {
                // Assignee may be invalid (deleted account, no repo access)
                core.warning(`Retrying without assignee: ${e.message}`);
                issue = await tracking.rest.issues.create({
                  owner: 'Comfy-Org',
                  repo: 'unreviewed-merges',
                  title: `[${repo}] PR #${pr.number} — ${pr.title}`,
                  body,
                  labels: ['unreviewed-merge', statusLabel, repoLabel],
                });
              } else {
                throw e;
              }
            }

            core.info(`Created tracking issue: ${issue.data.html_url}`);
